services:
  api:
    build: .
    command: node backend/src/server.js
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USE_POSTGRES: "true"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENABLE_ANALYTICS: "true"
    depends_on:
      - db

  frontend:
    build: .
    command: node frontend/src/server.js
    env_file:
      - ./backend/.env
    ports:
      - "5173:5173"
    environment:
      FRONTEND_PORT: 5173
      API_BASE: http://localhost:3000
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
